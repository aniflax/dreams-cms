services:
  - type: web
    name: dreams-cms
    env: node
    plan: free
    region: ohio
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: dreams-db
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: FRONTEND_URL
        value: https://dreamfurnitures.com
      - key: FRONTEND_WWW_URL
        value: https://www.dreamfurnitures.com
      - key: ENABLE_SEED_DATA
        value: false
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # You will need to manually add these in the Render dashboard after deployment.
      # Either naming scheme works:
      # - CLOUDINARY_NAME / CLOUDINARY_KEY / CLOUDINARY_SECRET
      # or
      # - CLOUDINARY_CLOUD_NAME / CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET

databases:
  - name: dreams-db
    plan: free
    region: ohio
